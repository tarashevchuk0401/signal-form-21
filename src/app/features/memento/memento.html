<p>memento works!</p>
<mat-form-field appearance="outline">
    <mat-label>Calculator</mat-label>
    <input [formControl]="dynamicValue" matInput  />
</mat-form-field>

<div>Result = {{ calculatorMemento.currentValue }}</div>
<div class="actions">
    <button (click)="undo()" matButton="filled">Undo</button>
    <button (click)="add()" matButton="filled">+</button>
    <button (click)="subtract()" matButton="filled">-</button>
</div>

<div>History</div>
@for (item of calculatorMemento.history; track $index) {
    <div>{{ item | json }}</div>
}
