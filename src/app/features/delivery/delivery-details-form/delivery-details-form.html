<p>Delivery Detail</p>
<div class="form-control">
  <mat-label>Type od delivery</mat-label>
  <mat-radio-group [formField]="deliveryDetailsForm().deliveryType">
    <mat-radio-button value="pickup">Pick up</mat-radio-button>
    <mat-radio-button value="home">Home</mat-radio-button>
  </mat-radio-group>
</div>

@if (!deliveryDetailsForm().address().hidden()) {
  <div class="form-control">
    <mat-form-field appearance="outline">
      <mat-label>City</mat-label>
      <input [formField]="deliveryDetailsForm().address.city" matInput placeholder="City" />
    </mat-form-field>

    <app-form-error [fieldRef]="deliveryDetailsForm().address.city" />
  </div>

  <div class="form-control">
    <mat-form-field appearance="outline">
      <mat-label>Street</mat-label>
      <input [formField]="deliveryDetailsForm().address.street" matInput placeholder="Street" />
    </mat-form-field>

    <app-form-error [fieldRef]="deliveryDetailsForm().address.street" />
  </div>

  <div class="form-control">
    <mat-form-field appearance="outline">
      <mat-label>ZIP</mat-label>
      <input [formField]="deliveryDetailsForm().address.zip" matInput placeholder="Zip" />
    </mat-form-field>

    <app-form-error [fieldRef]="deliveryDetailsForm().address.zip" />
  </div>
}

<div class="form-control">
  <mat-label>Day of delivery</mat-label>
  <mat-radio-group [formField]="deliveryDetailsForm().deliveryDay">
    <mat-radio-button value="Mon-Fri">Mon-Fri</mat-radio-button>
    <mat-radio-button value="Sat-Sun">Sat-Sun</mat-radio-button>
  </mat-radio-group>
</div>

<div class="form-control">
  <mat-form-field>
    <mat-label>Time Slots</mat-label>
    <mat-select [formField]="deliveryDetailsForm().timeSlot" [multiple]="false">
      <mat-option [value]="'10'">10:00 </mat-option>
      <mat-option [value]="'12'">12:00</mat-option>
      <mat-option [value]="'14'">14:00</mat-option>
      <mat-option [value]="'16'">16:00</mat-option>
    </mat-select>
  </mat-form-field>
  <app-form-error [fieldRef]="deliveryDetailsForm().timeSlot" />
</div>
