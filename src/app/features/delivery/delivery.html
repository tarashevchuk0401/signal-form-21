<form [formRoot]="deliveryForm">
  <div class="form-group">
    <p>Account</p>
    <button (click)="setAccountForm()" matButton>Set Account Form</button>
    <div class="form-control">
      <mat-form-field appearance="outline">
        <mat-label>User Name</mat-label>
        <input [formField]="deliveryForm.account.username" matInput placeholder="Name" />
      </mat-form-field>
      <app-form-error [fieldRef]="deliveryForm.account.username" />
    </div>

    <div class="form-control">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input [formField]="deliveryForm.account.email" matInput placeholder="Email" />
      </mat-form-field>
      <app-form-error [fieldRef]="deliveryForm.account.email" />
    </div>

    <div class="form-control">
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input [formField]="deliveryForm.account.password" matInput placeholder="Password" />
      </mat-form-field>

      <app-form-error [fieldRef]="deliveryForm.account.password" />
    </div>

    <div class="form-control">
      <mat-form-field appearance="outline">
        <mat-label>Confirm Password</mat-label>
        <input
          [formField]="deliveryForm.account.confirmPassword"
          matInput
          placeholder="Confirm Pasword"
        />
      </mat-form-field>
      <app-form-error [fieldRef]="deliveryForm.account.confirmPassword" />
    </div>
  </div>

  <div class="form-group">
    <p>Delivery Detail</p>
    <div class="form-control">
      <mat-label>Type od delivery</mat-label>
      <mat-radio-group [formField]="deliveryForm.deliveryDetails.deliveryType">
        <mat-radio-button value="pickup">Pick up</mat-radio-button>
        <mat-radio-button value="home">Home</mat-radio-button>
      </mat-radio-group>
    </div>

    @if (!deliveryForm.deliveryDetails.address().hidden()) {
      <div class="form-control">
        <mat-form-field appearance="outline">
          <mat-label>City</mat-label>
          <input
            [formField]="deliveryForm.deliveryDetails.address.city"
            matInput
            placeholder="City"
          />
        </mat-form-field>

        <app-form-error [fieldRef]="deliveryForm.deliveryDetails.address.city" />
      </div>

      <div class="form-control">
        <mat-form-field appearance="outline">
          <mat-label>Street</mat-label>
          <input
            [formField]="deliveryForm.deliveryDetails.address.street"
            matInput
            placeholder="Street"
          />
        </mat-form-field>

        <app-form-error [fieldRef]="deliveryForm.deliveryDetails.address.street" />
      </div>

      <div class="form-control">
        <mat-form-field appearance="outline">
          <mat-label>ZIP</mat-label>
          <input
            [formField]="deliveryForm.deliveryDetails.address.zip"
            matInput
            placeholder="Zip"
          />
        </mat-form-field>

        <app-form-error [fieldRef]="deliveryForm.deliveryDetails.address.zip" />
      </div>
    }

    <div class="form-control">
      <mat-label>Day of delivery</mat-label>
      <mat-radio-group [formField]="deliveryForm.deliveryDetails.deliveryDay">
        <mat-radio-button value="Mon-Fri">Mon-Fri</mat-radio-button>
        <mat-radio-button value="Sat-Sun">Sat-Sun</mat-radio-button>
      </mat-radio-group>
    </div>

    <div class="form-control">
      <mat-form-field>
        <mat-label>Time Slots</mat-label>
        <mat-select [formField]="deliveryForm.deliveryDetails.timeSlot" [multiple]="false">
          <mat-option [value]="'10'">10:00 </mat-option>
          <mat-option [value]="'12'">12:00</mat-option>
          <mat-option [value]="'14'">14:00</mat-option>
          <mat-option [value]="'16'">16:00</mat-option>
        </mat-select>
      </mat-form-field>
      <app-form-error [fieldRef]="deliveryForm.deliveryDetails.timeSlot" />
    </div>
  </div>

  <button type="submit" matButton="filled" [disabled]="!deliveryForm().valid()">Submit</button>
</form>
