<p>command works!</p>
<mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input [formControl]="dynamicValue" matInput  />
</mat-form-field>

<div>Result = {{ calculator.currentValue }}</div>
<div class="actions">
  <button (click)="undo()" matButton="filled">Undo</button>
  <button (click)="calculate('+')" matButton="filled">+</button>
  <button (click)="calculate('-')" matButton="filled">-</button>
</div>

<div>History</div>
@for (item of calculator.history; track $index) {
  <div>{{ item | json }}</div>
}
