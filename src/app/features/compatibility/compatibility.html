<div class="action">
  <mat-slide-toggle [checked]="isSignalForm()" (change)="toggleSignalForm()">
    {{ isSignalForm() ? 'Using Signal Form' : 'Using Reactive Form' }}
  </mat-slide-toggle>
</div>

  <form [formGroup]="nameForm" (ngSubmit)="onSubmit()">
    <p>Reactive</p>

    <div>
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input [formControl]="nameForm.controls.firstName" matInput placeholder="Name" />
